# Man.Ai.ger の Slack App Manifest。
# 使い方: https://api.slack.com/apps → Create New App → "From a manifest" → これを貼り付け
#
# 会社ワークスペースへの展開時も同じ manifest で "Create from manifest" するだけ
# (requirements.md §3 環境移植性)。スコープは Bot DM と、Bot が参加している
# channel/group でのオーナー mention 観測に限定する —
# これがそのまま Slack 管理者への承認申請資料になります。
display_information:
  name: Man.Ai.ger
  description: 共感コーチ型のマネジメント AI。タスクの開始・途中・終了に伴走します (ローカル動作・単一ユーザー)
  background_color: "#1a2b3c"
features:
  bot_user:
    display_name: Man.Ai.ger
    always_online: false
oauth_config:
  scopes:
    bot:
      - chat:write   # DM の送信
      - im:history   # 自分宛て DM の受信 (message.im イベント)
      - im:write     # DM チャンネルを開く (conversations.open)
      - channels:history # Bot 参加済み public channel の owner mention 観測
      - groups:history   # Bot 参加済み private channel の owner mention 観測
settings:
  event_subscriptions:
    bot_events:
      - message.im
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
